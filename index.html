<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Directorio Generación 2026</title>
<style>
:root { --primary: #FFD100; --dark: #111111; --gray: #6B7280; --gold:#D4A72C; }
* { box-sizing: border-box; }
body { font-family: Inter, Arial, Segoe UI, Roboto, "Helvetica Neue", sans-serif; margin:0; color: var(--dark); background:#fff; }
header {
 padding-left: 120px; /* espacio para logo grande */ padding:16px 24px 8px; border-bottom:4px solid var(--primary); position:sticky; top:0; background:#fff; z-index:2000; }
h1 { text-align:center; font-size:28px; margin:0 0 8px; }
.subtitle { text-align:center; color:#6B7280; font-size:16px; margin-bottom:10px; }
.grid { display:grid; gap:20px; padding:24px; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); }
.card { perspective: 1000px; height: 420px; }
.card-inner { position: relative; width:100%; height:100%; transform-style: preserve-3d; transition: transform .6s; }
.card.is-flipped .card-inner { transform: rotateY(180deg); }
.card-face { position:absolute; inset:0; backface-visibility:hidden; border:2px solid var(--primary); border-radius:18px; background:#fff; padding:18px 14px 12px; text-align:center; box-shadow:0 2px 4px rgb(0 0 0 / 8%); }
.avatar { width:160px; height:160px; margin:0 auto 8px; border-radius:50%; border:6px solid var(--primary); background:#E8E8E8; display:flex; align-items:center; justify-content:center; font-size:40px; }
.name { margin:2px 0 0; font-weight:800; font-size:16px; }
.ne { font-size:12px; color:var(--gray); margin-top:4px; }
.role { margin-top:1cm; font-size:12px; font-weight:600; }
.unit { font-size:12px; font-weight:600; }
.btn { border:0; cursor:pointer; font-weight:700; border-radius:12px; padding:8px 16px; font-size:13px; min-width:110px; height:36px; }
.btn-primary { background:var(--gold); color:#000; margin-top:3cm; }
.card-back { transform:rotateY(180deg); display:flex; flex-direction:column; }
.content { margin-top:4px; border:2px solid var(--primary); border-radius:12px; padding:12px; background:#fff; font-size:13px; line-height:1.5; text-align:left; max-height:260px; overflow-y:auto; }
.sec h4 { margin:8px 0 4px; font-size:13px; color:var(--gray); font-weight:700; }
.actions { margin-top:10px; display:flex; gap:10px; justify-content:center; }
.btn-linkedin { background:var(--primary); color:#111; }
.btn-secondary { background:#EFEFEF; color:#111; }

/* === AJUSTE VISUAL TARJETA FRONTAL (SEGÚN IMAGEN) === */
.avatar {
  width: 170px;
  height: 170px;
  border: 8px solid var(--primary);
  border-radius: 50%;
  background: #eee;
  margin: 10px auto 14px;
}

/* Nombre centrado y protagonista */
.name {
  font-size: 18px;
  font-weight: 800;
  line-height: 1.15;
  margin: 6px 0 6px;
}

/* Ocultar número de empleado en frontal */
.ne { display: none; }

/* Puesto y unidad juntos, más compactos */
.role {
  margin-top: 4px;
  font-size: 14px;
  font-weight: 600;
}
.unit {
  margin-top: 2px;
  font-size: 14px;
  font-weight: 600;
}

/* Botón tipo píldora, centrado debajo */
.btn-primary {
  background: var(--gold);
  color: #111;
  border-radius: 22px;
  padding: 10px 22px;
  min-width: auto;
  height: auto;
  margin: 14px auto 0;
}


/* === AJUSTES DEFINITIVOS BLOQUE SECUNDARIO + PREPARACIÓN BOTÓN === */

/* Mostrar siempre el número de empleado */
.ne {
  display: block !important;
  font-size: 14px;
  font-weight: 600;
  color: #444;
  margin-top: 6px;       /* espacio claro vs nombre */
  line-height: 1.15;
}

/* Puesto y unidad compactos */
.role {
  font-size: 14px;
  font-weight: 600;
  margin-top: 2px;
  margin-bottom: 0;     /* elimina hueco residual */
  line-height: 1.15;
}

.unit {
  font-size: 14px;
  font-weight: 600;
  margin-top: 0;        /* completamente pegado */
  line-height: 1.15;
}

/* Botón Ver ficha ligeramente más grande (SIN anclar todavía) */
.btn-primary {
  padding: 12px 26px;   /* +2px */
  font-size: 14px;
  border-radius: 24px;
}


/* === BOTÓN VER FICHA – ZONA FIJA SIN POSICIÓN ABSOLUTA === */

/* Convertir tarjeta frontal en layout con zonas */
.card-face {
  display: flex;
  flex-direction: column;
}

/* Botón Ver ficha vive en la parte inferior de una zona fija */
.btn-primary {
  margin-top: auto;       /* empuja el botón hacia abajo */
  align-self: center;     /* centrado horizontal */
  padding: 13px 28px;     /* +2–3px respecto al estado anterior */
  font-size: 14px;
}


/* === AJUSTE BOTONES REVERSO: CENTRADOS Y MISMA ALTURA EN TODAS LAS TARJETAS === */

.card-back {
  display: flex;
  flex-direction: column;
}

/* El contenido ocupa siempre la zona superior */
.card-back .content {
  margin-bottom: 0;
}

/* Zona de acciones fija y consistente */
.card-back .actions {
  margin-top: auto;          /* empuja siempre hacia la zona inferior */
  margin-bottom: 40px;       /* baja los botones como en la referencia visual */
  display: flex;
  justify-content: center;   /* centra el bloque completo */
  align-items: center;
  gap: 16px;                 /* separación pareja entre LinkedIn y Regresar */
}


/* ===============================
   FONDO FINAL MÁS VISIBLE (APROBACIÓN)
   =============================== */

body {
  background-color: #f7f8f6;
  background-image: url('Fondo.jpg');
  background-repeat: repeat;
  background-position: center;
  background-attachment: fixed;
  background-size: cover;
}

/* Overlay global — deja ver claramente el patrón */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.45);
  pointer-events: none;
  z-index: -1;
}

/* Encabezado con el mismo fondo y buen contraste */
header {
  background-image: url('encabezado.jpg');
  background-repeat: repeat;
  background-position: center;
  background-size: cover;
}

header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.70);
  z-index: -1;
}


/* === AVATAR SIMPLE (WEB-READY) === */
.avatar {
  width: 170px;
  height: 170px;
  border-radius: 50%;
  border: 8px solid var(--primary);
  background: #eee;
  overflow: hidden;
}
.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}


/* ===== AVATAR CON FOTO + FALLBACK ICONO ===== */
.avatar {
  width: 170px;
  height: 170px;
  border-radius: 50%;
  border: 8px solid var(--primary);
  background: #eee;
  margin: 10px auto 14px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
}
.avatar-fallback {
  font-size: 40px;
  color: #999;
  z-index: 1;
}


/* ===== HEADER CON LOGO (ESQUINA IZQUIERDA) ===== */
header {
  position: sticky;
  top: 0;
}

.header-inner {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-container {
  position: absolute;
  left: 24px;
}

.logo-container img {
  height: 72px; /* logo grande, referencia recuadro rojo */
  width: auto;
}

.title-container {
  text-align: center;
}


/* ===============================
   AJUSTE HEADER SOLO EN MÓVIL
   NO AFECTA DESKTOP
   =============================== */
@media (max-width: 768px) {
  header {
    padding: 16px 16px 12px;
  }

  .header-inner {
    flex-direction: column;
  }

  /* El logo deja de ser absoluto SOLO en móvil */
  .logo-container {
    position: relative;
    left: 0;
    margin-bottom: 12px;
  }

  .logo-container img {
    height: 48px;
  }

  h1 {
    font-size: 22px;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 14px;
    margin-bottom: 6px;
  }
}

</style>
</head>
